services:
  api:
    build: .
    container_name: ragops-api
    restart: unless-stopped
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - ./data:/app/data
      - ./prompts:/app/prompts:ro
    env_file:
      - path: .env.example
        required: true
      - path: .env
        required: false
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://127.0.0.1:8000/health', timeout=3).raise_for_status()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    depends_on:
      - postgres
      - qdrant

  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
    container_name: ragops-frontend
    restart: unless-stopped
    ports:
      - "127.0.0.1:8501:8501"
    environment:
      API_BASE_URL: ${API_BASE_URL:-http://api:8000}
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://127.0.0.1:8501', timeout=3).raise_for_status()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    depends_on:
      - api

  postgres:
    image: postgres:16-alpine
    container_name: ragops-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ragops
      POSTGRES_USER: ragops
      POSTGRES_PASSWORD: ragops_dev_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ragops -d ragops"]
      interval: 30s
      timeout: 5s
      retries: 3

  qdrant:
    image: qdrant/qdrant:v1.12.4
    container_name: ragops-qdrant
    restart: unless-stopped
    volumes:
      - qdrant_data:/qdrant/storage
    ports:
      - "127.0.0.1:6333:6333"

  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: ragops-prometheus
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "127.0.0.1:9090:9090"
    depends_on:
      - api

  grafana:
    image: grafana/grafana:11.4.0
    container_name: ragops-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      - prometheus

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.18.0
    container_name: ragops-mlflow
    profiles: ["mlflow"]
    restart: unless-stopped
    command: mlflow server --host 0.0.0.0 --port 5000 --backend-store-uri sqlite:///mlflow.db --default-artifact-root /mlflow/artifacts
    volumes:
      - mlflow_data:/mlflow
    ports:
      - "127.0.0.1:5000:5000"

volumes:
  postgres_data:
  qdrant_data:
  prometheus_data:
  grafana_data:
  mlflow_data:
