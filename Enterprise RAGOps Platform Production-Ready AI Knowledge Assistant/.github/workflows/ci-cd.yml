name: enterprise-ragops-ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run tests
        run: pytest -q
      - name: Run RAG evaluation gate
        run: python -m scripts.run_evaluation --threshold 0.65
      - name: Run retrieval quality gate
        run: python -m scripts.test_retrieval_quality --threshold 0.75
      - name: Validate Docker Compose
        run: docker compose config
      - name: Build Docker image
        run: docker compose build api frontend

  deploy:
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push' && vars.ENABLE_DROPLET_DEPLOY == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "${{ secrets.DO_HOST }}" >> ~/.ssh/known_hosts
      - name: Deploy to DigitalOcean Droplet
        run: |
          ssh "${{ secrets.DO_USER }}@${{ secrets.DO_HOST }}" << 'EOF'
            set -euo pipefail
            cd ~/enterprise-ragops-platform
            git pull --ff-only
            test -f .env || cp .env.example .env
            docker compose up -d --build
            docker compose ps
          EOF
