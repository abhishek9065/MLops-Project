name: CI/CD

# Monorepo layout: the churn project lives in "CX Curn Project/".
# GitHub Actions only reads workflows from .github/workflows/ at the REPO ROOT,
# so this file stays here while its steps run inside the project subfolder.
on:
  push:
    branches: [master]
    paths: ["CX Curn Project/**", ".github/workflows/**"]
  pull_request:
    branches: [master]
    paths: ["CX Curn Project/**", ".github/workflows/**"]

# The project code is in this subfolder. `run:` steps default to it.
defaults:
  run:
    working-directory: "CX Curn Project"

jobs:
  # ---------------------------------------------------------------------------
  # 1) TEST: the quality gate. Nothing ships if this fails.
  # ---------------------------------------------------------------------------
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: "CX Curn Project/requirements.txt"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest

  # ---------------------------------------------------------------------------
  # 2) BUILD & PUSH: only on push to master. Publishes the image to GHCR.
  # ---------------------------------------------------------------------------
  build-and-push:
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      # Sets up the buildx "docker-container" driver, which is required for
      # the GitHub Actions (gha) build cache export used below.
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: "CX Curn Project"          # build from the project subfolder
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ---------------------------------------------------------------------------
  # 3) DEPLOY: SSH into the DigitalOcean droplet, pull the new image, restart.
  # ---------------------------------------------------------------------------
  deploy:
    needs: build-and-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to DigitalOcean over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          script: |
            set -e
            cd ~/mlops-churn-prediction
            echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u "${{ secrets.GHCR_USER }}" --password-stdin
            export API_IMAGE=ghcr.io/${{ github.repository }}:latest
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d
            docker image prune -f
