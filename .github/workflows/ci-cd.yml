name: CI/CD

# WHEN this runs:
#  - every push to master -> full pipeline (test -> build -> deploy)
#  - every pull request  -> tests only (never deploys unreviewed code)
on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  # ---------------------------------------------------------------------------
  # 1) TEST: the quality gate. Nothing ships if this fails.
  # ---------------------------------------------------------------------------
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"        # same version we validated locally
          cache: pip                     # cache deps across runs -> faster CI

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest

  # ---------------------------------------------------------------------------
  # 2) BUILD & PUSH: only on push to master. Publishes the image to GHCR.
  # ---------------------------------------------------------------------------
  build-and-push:
    needs: test                          # runs only if `test` passed
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write                    # allow pushing to GHCR
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}   # auto-provided, no setup needed

      - name: Compute image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha           # immutable tag = the commit SHA (traceability)
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ---------------------------------------------------------------------------
  # 3) DEPLOY: SSH into the DigitalOcean droplet, pull the new image, restart.
  # ---------------------------------------------------------------------------
  deploy:
    needs: build-and-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to DigitalOcean over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          script: |
            set -e
            cd ~/mlops-churn-prediction
            echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u "${{ secrets.GHCR_USER }}" --password-stdin
            export API_IMAGE=ghcr.io/${{ github.repository }}:latest
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d
            docker image prune -f
