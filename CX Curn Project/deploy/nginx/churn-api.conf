# Nginx reverse proxy for the Churn API.
# WHY put Nginx in front of Uvicorn?
#  - terminate HTTPS (Uvicorn shouldn't do TLS in production)
#  - serve on standard port 80/443 (users don't type :8000)
#  - add rate limiting, timeouts, and a single public entry point
#
# Install:
#   sudo cp churn-api.conf /etc/nginx/sites-available/churn-api
#   sudo ln -s /etc/nginx/sites-available/churn-api /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
# Then run Certbot (see digitalocean_deploy.md) to add the TLS block automatically.

# Basic rate limit: protect the model from abusive traffic.
# NOTE: limit_req_zone must live at the http level (this file is included
# there), NOT inside server{} -- nginx -t rejects it otherwise.
limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;

server {
    listen 80;
    server_name your-domain.com;   # or the droplet IP if you have no domain

    location / {
        limit_req zone=api burst=20 nodelay;

        proxy_pass http://127.0.0.1:8000;   # -> the container's published port
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 10s;
        proxy_read_timeout 30s;
    }

    # Optional: expose the health endpoint without rate limiting for uptime checks.
    location /health {
        proxy_pass http://127.0.0.1:8000/health;
    }
}
