# Prometheus scrape configuration.
# Prometheus polls each target's /metrics endpoint on `scrape_interval` and
# stores the results as time series that Grafana can query.

global:
  scrape_interval: 10s        # how often to pull metrics
  evaluation_interval: 15s

scrape_configs:
  - job_name: "churn-api"
    metrics_path: /metrics
    static_configs:
      # "api" is the service name in docker-compose; Docker DNS resolves it.
      - targets: ["api:8000"]

  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
